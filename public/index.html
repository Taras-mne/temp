<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foldy</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .counter-display {
      font-size: 5rem;
      font-weight: 800;
      color: #a78bfa;
      line-height: 1;
      transition: transform 0.1s ease;
    }

    .counter-display.bump {
      transform: scale(1.15);
    }

    button {
      background-color: #7c3aed;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4);
    }

    button:hover {
      background-color: #6d28d9;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
    }

    button:active {
      transform: scale(0.96);
    }

    .label {
      font-size: 0.95rem;
      color: #6b7280;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1>Hello, World!</h1>

  <p class="label">Click count</p>
  <div class="counter-display" id="counter">0</div>

  <button id="incrementBtn">Click me</button>

  <script>
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('incrementBtn');

    async function fetchCount() {
      const res = await fetch('/api/counter');
      const data = await res.json();
      counterEl.textContent = data.count;
    }

    async function increment() {
      const res = await fetch('/api/counter/increment', { method: 'POST' });
      const data = await res.json();
      counterEl.textContent = data.count;

      // Bump animation
      counterEl.classList.remove('bump');
      void counterEl.offsetWidth; // reflow
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 100);
    }

    btn.addEventListener('click', increment);

    // Load initial count on page load
    fetchCount();
  </script>

</body>
</html>
